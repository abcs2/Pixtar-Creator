<!DOCTYPE html>
<html>
    <head>
        <title>Editor</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="all">
            <div id="ops">
                <p>
                    <button type="button" id="undo">undo</button>
                    <button type="button" id="redo">redo</button><br>
                    <button type="button" id="clear">clear</button>
                    <button type="button" id="delete">delete</button>
                    <button type="button" id="copy">copy</button>
                </p>
                <p>
                    <small>Modifier: <span id="modMessage"></span> (ctrl to change)</small>
                </p>
                <p>
                    <button type="button" id="Lbutton"><</button>
                    <button type="button" id="Rbutton">></button>
                    <button type="button" id="Ubutton">^</button>
                    <button type="button" id="Dbutton">v</button>
                    <br><br>

                    <button type="button" id="sizeUp">+</button>
                    <button type="button" id="sizeDown">-</button>
                    <button type="button" id="stretchH"><|></button>
                    <button type="button" id="stretchV">>|<</button>
                    <br>
                    <button type="button" id="rotateDown">rotate <</button>
                    <button type="button" id="rotateUp">rotate ></button>
                    <button type="button" id="flipH">flip | </button>
                    <button type="button" id="flipV">flip --</button>
                </p>
                <p>
                    <button type="button" id="mirror">mirror: <span id="mirrorMode">OFF</span></button>
                </p>
                <p>
                    <button type="button" id="download">download</button> 
                    <small>Objects: <span id="objCount">0</span></small>
                </p>
                <p>
                    <input type="color" id="colorInput" value="#000000"><button id="currentColor" class="colorBlock"></button> | 
                    <small>Background color: </small><button id="bgColor" class="colorBlock"></button>
                    <div id="colorList"></div>
                </p>
            </div>
            <div id="charContainer">
                <div>
                    <small>Alphabet: <span id="alphabetMessage"></span> (Ç to change)</small> | 
                    <button type="button" id="replaceLetter">replace letter mode</button>
                </div>
                <div>
                    <small>Font: <span id="fontMessage"></span> (F to change)</small> | 
                    <button type="button" id="fontOne">replace one</button>
                    <button type="button" id="fontAll">replace all</button><br>
                </div>
                <br>
                <div id="alphabet"></div>
            </div>
            <div id="canvas"></div>
        </div>
    </body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</html>
