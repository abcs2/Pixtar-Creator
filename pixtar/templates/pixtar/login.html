{% extends 'pixtar/base.html' %}

{% block content %}
<a class="backButton" href="{% url 'pixtar:index' %}">←</a>
<div class="topButtons">
    <form method="POST">
        {% csrf_token %}
        <div>
            <input type="text" class="form" name="username" placeholder="Username" maxlength="35"><br>
            <input type="password" class="form" name="password" placeholder="Password"><br>
            {% if error %}
                {{ error }}
            {% endif %}
        </div>
        <button type="submit" class="linkButton btn loginButton">Login</button>
    </form>
    <a href="{% url 'pixtar:register' %}">Register</a>
</div>
{% endblock %}
